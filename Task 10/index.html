<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Hotel Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 420px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #b8860b;
            color: white;
            padding: 18px 20px;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 3px;
        }

        .chat-messages {
            height: 420px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bot-message {
            background: #f1f1f1;
            color: #222;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background: #b8860b;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .chat-input input:focus {
            border-color: #b8860b;
        }

        .chat-input button {
            background: #b8860b;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-input button:hover {
            background: #9a7009;
        }

        .suggestions {
            padding: 8px 12px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .suggestion-btn {
            background: #fff8e1;
            border: 1px solid #b8860b;
            color: #b8860b;
            padding: 5px 10px;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
        }

        .suggestion-btn:hover {
            background: #b8860b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Grand Hotel Assistant</h2>
            <p>Ask about rooms, prices, amenities or booking</p>
        </div>

        <div class="suggestions">
            <button class="suggestion-btn" onclick="send('Room types')">Room types</button>
            <button class="suggestion-btn" onclick="send('Prices')">Prices</button>
            <button class="suggestion-btn" onclick="send('Amenities')">Amenities</button>
            <button class="suggestion-btn" onclick="send('How to book?')">Booking</button>
            <button class="suggestion-btn" onclick="send('Check in time')">Check-in</button>
            <button class="suggestion-btn" onclick="send('Location')">Location</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">Hello! Welcome to Grand Hotel. Ask me about rooms, prices, amenities, or booking.</div>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function send(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage(message, 'user-message');
            input.value = '';

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            })
            .then(res => res.json())
            .then(data => appendMessage(data.response, 'bot-message'));
        }

        function appendMessage(text, cls) {
            const box = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message ' + cls;
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
