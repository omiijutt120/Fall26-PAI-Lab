<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dubai Boys Hostel — Info Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0c0b;
      --panel:    #141310;
      --border:   #2a2720;
      --gold:     #c9a84c;
      --gold-dim: #8a6e30;
      --cream:    #f2ead8;
      --muted:    #6b6456;
      --user-bg:  #1e1b16;
      --bot-bg:   #191610;
      --radius:   14px;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Jost', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-body);
      font-weight: 300;
    }

    /* ===== LAYOUT ===== */
    .wrap {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 40px 28px;
      gap: 36px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-name {
      font-family: var(--font-display);
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.1;
      color: var(--cream);
    }

    .logo-tag {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }

    .quick-title {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 300;
      padding: 6px 13px;
      border-radius: 30px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      letter-spacing: 0.04em;
    }

    .chip:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 168, 76, 0.06);
    }

    .info-block {
      margin-top: auto;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .info-row:last-child { border-bottom: 1px solid var(--border); }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 22px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--bg);
      font-weight: 600;
      flex-shrink: 0;
    }

    .header-text h2 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--cream);
    }

    .header-text p {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ===== MESSAGES ===== */
    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 30px 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .msgs::-webkit-scrollbar { width: 4px; }
    .msgs::-webkit-scrollbar-track { background: transparent; }
    .msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 500;
      margin-top: 2px;
    }

    .msg.bot .msg-avatar {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: var(--bg);
    }

    .msg.user .msg-avatar {
      background: var(--user-bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .bubble {
      max-width: 68%;
      padding: 13px 18px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--cream);
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2e2b24;
      border-top-right-radius: 4px;
      color: #d4c9b2;
    }

    .timestamp {
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg.user .timestamp { text-align: right; }

    .msg-wrap {
      display: flex;
      flex-direction: column;
    }

    .msg.user .msg-wrap { align-items: flex-end; }

    /* typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 20px;
    }

    .dot-t {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      animation: bounce 1.1s ease-in-out infinite;
    }

    .dot-t:nth-child(2) { animation-delay: 0.18s; }
    .dot-t:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ===== INPUT BAR ===== */
    .input-bar {
      padding: 20px 32px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--panel);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 10px 14px 10px 22px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--gold-dim); }

    #inp {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    #inp::placeholder { color: var(--muted); }

    #send {
      background: var(--gold);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    #send:hover { background: #b8943c; transform: scale(1.05); }
    #send:active { transform: scale(0.96); }

    #send svg { color: var(--bg); }

    .hint {
      font-size: 0.62rem;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.04em;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 680px) {
      .wrap { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-name">Dubai Boys<br>Hostel</span>
      <span class="logo-tag">Virtual Concierge</span>
    </div>

    <div class="divider"></div>

    <div>
      <p class="quick-title">Quick Topics</p>
      <div class="chips">
        <button class="chip" onclick="ask('What rooms do you have?')">Rooms</button>
        <button class="chip" onclick="ask('What are the monthly prices?')">Pricing</button>
        <button class="chip" onclick="ask('What is the standard room price?')">Standard</button>
        <button class="chip" onclick="ask('Tell me about the deluxe room')">Deluxe</button>
        <button class="chip" onclick="ask('Tell me about the private suite')">Suite</button>
        <button class="chip" onclick="ask('Is there a canteen?')">Canteen</button>
        <button class="chip" onclick="ask('What time is check-in?')">Check-in</button>
        <button class="chip" onclick="ask('How do I book a room?')">Booking</button>
        <button class="chip" onclick="ask('Is parking available?')">Parking</button>
        <button class="chip" onclick="ask('Is WiFi free?')">Wi-Fi</button>
        <button class="chip" onclick="ask('Where is the hostel located?')">Location</button>
        <button class="chip" onclick="ask('What are the hostel rules?')">Rules</button>
      </div>
    </div>

    <div class="info-block">
      <div class="info-row"><span class="dot"></span>Concierge online 24/7</div>
      <div class="info-row">📞 0300-1234567</div>
      <div class="info-row">📍 Lahore, Pakistan</div>
    </div>
  </aside>

  <!-- Chat -->
  <section class="chat-area">
    <header class="chat-header">
      <div class="avatar">G</div>
      <div class="header-text">
        <h2>Hostel Info Bot</h2>
        <p>Dubai Boys Hostel · Available now</p>
      </div>
    </header>

    <div class="msgs" id="msgs"></div>

    <div class="input-bar">
      <div class="input-row">
        <input id="inp" type="text" placeholder="Ask about rooms, amenities, booking…" autocomplete="off"/>
        <button id="send" onclick="send()" title="Send">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="hint">Press Enter to send · Powered by Grand Horizon</p>
    </div>
  </section>

</div>

<script>
  const box  = document.getElementById("msgs");
  const inp  = document.getElementById("inp");

  function now() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addMsg(text, role) {
    const row   = document.createElement("div");
    row.className = `msg ${role}`;

    const av    = document.createElement("div");
    av.className = "msg-avatar";
    av.textContent = role === "bot" ? "G" : "You";

    const wrap  = document.createElement("div");
    wrap.className = "msg-wrap";

    const bub   = document.createElement("div");
    bub.className = "bubble";
    bub.textContent = text;

    const ts    = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = now();

    wrap.appendChild(bub);
    wrap.appendChild(ts);
    row.appendChild(av);
    row.appendChild(wrap);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
    return row;
  }

  function showTyping() {
    const row   = document.createElement("div");
    row.className = "msg bot typing";
    row.id = "typing";

    const av    = document.createElement("div");
    av.className = "msg-avatar";
    av.textContent = "G";

    const bub   = document.createElement("div");
    bub.className = "bubble";
    bub.innerHTML = '<span class="dot-t"></span><span class="dot-t"></span><span class="dot-t"></span>';

    row.appendChild(av);
    row.appendChild(bub);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function send() {
    const msg = inp.value.trim();
    if (!msg) return;

    inp.value = "";
    addMsg(msg, "user");
    showTyping();

    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg }),
      });
      const data = await res.json();
      hideTyping();
      addMsg(data.reply, "bot");
    } catch {
      hideTyping();
      addMsg("Connection issue. Please try again.", "bot");
    }
  }

  function ask(q) {
    inp.value = q;
    send();
  }

  inp.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // Welcome message on load
  window.addEventListener("load", () => {
    setTimeout(() => {
      addMsg(
        "Welcome to Dubai Boys Hostel! I am your hostel info assistant.\n\n" +
        "Ask me about room types and monthly prices, facilities like Wi-Fi and canteen, " +
        "check-in times, advance payment, booking, or our location in Lahore. " +
        "You can also use the quick-topic buttons on the left.",
        "bot"
      );
    }, 400);
  });
</script>

</body>
</html>
