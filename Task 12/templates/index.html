<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dubai Boys Hostel 🏨</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #08080f;
      --card:   #0f0f1a;
      --border: #1e1e30;
      --purple: #8b5cf6;
      --pink:   #ec4899;
      --cyan:   #06b6d4;
      --green:  #10b981;
      --text:   #f0eeff;
      --muted:  #5a5a7a;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
    }

    /* glow blobs */
    .blob1, .blob2 {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.10;
    }
    .blob1 { width: 700px; height: 700px; background: #8b5cf6; top: -250px; left: -250px; }
    .blob2 { width: 600px; height: 600px; background: #ec4899; bottom: -200px; right: -200px; }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      gap: 28px;
    }

    /* header */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.35);
      color: #a78bfa;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 15px;
      border-radius: 40px;
      margin-bottom: 14px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #8b5cf6;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    h1 {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #ec4899, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .sub {
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
    }

    /* search card */
    .scard {
      width: 100%;
      max-width: 700px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .scard:focus-within {
      border-color: rgba(139,92,246,0.5);
      box-shadow: 0 0 50px rgba(139,92,246,0.12);
    }

    .irow {
      display: flex;
      gap: 10px;
    }

    #inp {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 17px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #inp::placeholder { color: var(--muted); }
    #inp:focus { border-color: var(--purple); }

    #btn {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border: none;
      border-radius: 12px;
      padding: 13px 22px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }
    #btn:hover   { opacity: 0.85; transform: translateY(-1px); }
    #btn:active  { transform: scale(0.97); }
    #btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* chips */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.74rem;
      padding: 5px 13px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover {
      border-color: var(--purple);
      color: #c4b5fd;
      background: rgba(139,92,246,0.08);
    }

    /* results */
    .results {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rlabel {
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
    }

    .rcard {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      gap: 13px;
      align-items: flex-start;
      animation: up 0.3s ease both;
      transition: border-color 0.2s, transform 0.2s;
    }
    .rcard:hover {
      border-color: rgba(139,92,246,0.4);
      transform: translateX(3px);
    }
    .rcard:nth-child(2) { animation-delay: 0.07s; }
    .rcard:nth-child(3) { animation-delay: 0.14s; }

    @keyframes up {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .num {
      width: 30px; height: 30px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      flex-shrink: 0;
    }
    .rcard:nth-child(2) .num { background: rgba(139,92,246,0.18); color: #a78bfa; }
    .rcard:nth-child(3) .num { background: rgba(6,182,212,0.18);  color: #67e8f9; }
    .rcard:nth-child(4) .num { background: rgba(16,185,129,0.18); color: #6ee7b7; }

    .rbody { flex: 1; }
    .rtxt  { font-size: 0.88rem; line-height: 1.65; color: var(--text); }
    .rmeta { margin-top: 6px; font-size: 0.66rem; color: var(--muted); font-family: 'Space Mono', monospace; }

    /* empty / error */
    .empty, .err {
      text-align: center;
      padding: 30px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .err { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.05); color: #f87171; }

    /* dots */
    .dots { display:flex; gap:6px; justify-content:center; padding:26px; }
    .dot  { width:8px; height:8px; border-radius:50%; animation: b 1.1s ease-in-out infinite; }
    .dot:nth-child(1) { background: var(--purple); }
    .dot:nth-child(2) { background: var(--pink);   animation-delay: 0.18s; }
    .dot:nth-child(3) { background: var(--cyan);   animation-delay: 0.36s; }
    @keyframes b {
      0%,80%,100% { transform:translateY(0);    opacity:0.3; }
      40%          { transform:translateY(-9px); opacity:1;   }
    }

    footer {
      position: relative; z-index: 1;
      text-align: center;
      font-size: 0.66rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-bottom: 20px;
    }
    footer span {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @media (max-width: 480px) {
      .irow { flex-direction: column; }
      #btn  { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>

<div class="page">

  <div style="text-align:center">
    <div class="badge"><div class="badge-dot"></div>MiniLM + FAISS · Live</div>
    <h1>Dubai Boys Hostel 🏨</h1>
    <p class="sub">ask anything about the hostel fr fr, i got you bestie 💜</p>
  </div>

  <div class="scard">
    <div class="irow">
      <input id="inp" type="text" placeholder="how much is monthly rent? 💸" autocomplete="off"/>
      <button id="btn" onclick="doAsk()">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Search
      </button>
    </div>
    <div class="chips">
      <button class="chip" onclick="chip('monthly rent')">💰 Monthly rent</button>
      <button class="chip" onclick="chip('room types available')">🛏️ Rooms</button>
      <button class="chip" onclick="chip('wifi internet')">📶 WiFi</button>
      <button class="chip" onclick="chip('check in time')">🕛 Check-in</button>
      <button class="chip" onclick="chip('food canteen meals')">🍛 Food</button>
      <button class="chip" onclick="chip('how to book reservation')">📅 Booking</button>
      <button class="chip" onclick="chip('location address')">📍 Location</button>
      <button class="chip" onclick="chip('rules cnic smoking')">📋 Rules</button>
      <button class="chip" onclick="chip('security cctv guard')">🔒 Security</button>
      <button class="chip" onclick="chip('parking motorbike car')">🏍️ Parking</button>
    </div>
  </div>

  <div class="results" id="res">
    <div class="empty">✨ ask something above and i'll find the answer no cap</div>
  </div>

</div>

<footer>PAI Lab 12 &nbsp;·&nbsp; <span>Dubai Boys Hostel QnA Bot</span> &nbsp;·&nbsp; MiniLM + FAISS</footer>

<script>
  const inp = document.getElementById("inp");
  const btn = document.getElementById("btn");
  const res = document.getElementById("res");

  inp.addEventListener("keydown", e => { if (e.key === "Enter") doAsk(); });

  function chip(q) { inp.value = q; doAsk(); }

  function spin() {
    res.innerHTML = `<div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  }

  async function doAsk() {
    const q = inp.value.trim();
    if (!q) return;
    btn.disabled = true;
    spin();

    try {
      const r = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ q })
      });

      if (!r.ok) throw new Error("bad response");
      const data = await r.json();

      if (!data.hits || data.hits.length === 0) {
        res.innerHTML = `<div class="empty">😶 no results found, try different words</div>`;
        return;
      }

      const tags = ["#1 best match", "#2 match", "#3 match"];
      let html = `<div class="rlabel">results for: "${data.q}"</div>`;
      data.hits.forEach((h, i) => {
        html += `
          <div class="rcard">
            <div class="num">${i + 1}</div>
            <div class="rbody">
              <div class="rtxt">${h.text}</div>
              <div class="rmeta">${tags[i]} &nbsp;·&nbsp; score ${h.dist}</div>
            </div>
          </div>`;
      });
      res.innerHTML = html;

    } catch {
      res.innerHTML = `<div class="err">😬 server error — make sure you ran <b>python app.py</b> from inside the <b>DubaiBoys</b> folder</div>`;
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
